name: Daily AgMarketReport Update

on:
  schedule:
    # 7:00 AM Pacific Daylight Time = 14:00 UTC
    - cron: '0 14 * * *'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print update time
        run: |
          echo "AgMarketReport update started"
          date

      - name: Finished
        run: echo "Ready to generate today's report."
